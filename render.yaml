services:
  - type: web
    name: ojas-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_entrypoint.sh
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESET_KEY
        sync: false
      - key: RATE_LIMIT
        value: 100/minute
      - key: DATABASE_POOL_SIZE
        value: 10
      - key: DATABASE_MAX_OVERFLOW
        value: 20
      - key: WHATSAPP_API_KEY
        sync: false
      - key: WHATSAPP_API_URL
        value: https://waba.360dialog.io/v1/messages
