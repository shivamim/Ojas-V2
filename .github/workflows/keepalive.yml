# This workflow pings your Render backend every 10 minutes to prevent cold starts.
# Render free/starter plans spin down after 15 minutes of inactivity.
# First request after idle takes 30-90 seconds to boot.
# 
# Setup:
# 1. Add this file to your repo
# 2. Set the secret RENDER_BACKEND_URL in GitHub repo settings
#    (e.g., https://ojas-backend.onrender.com)
# 3. Or hardcode the URL below (less secure)
#
# Alternative: Use UptimeRobot (free) with a 5-minute ping interval.

name: Keep Alive
on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          BACKEND_URL="${RENDER_BACKEND_URL:-https://ojas-backend.onrender.com}"
          echo "Pinging $BACKEND_URL/health ..."
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$BACKEND_URL/health" || echo "000")
          
          echo "Response code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Backend is healthy"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Could not reach backend (network timeout)"
          else
            echo "⚠️ Backend returned HTTP $HTTP_CODE"
          fi
