name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Frontend: Lint + Type check + Build
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Install lint tools if not in package.json
      - run: |
          if ! grep -q "eslint" package.json; then
            npm install -D eslint @eslint/js eslint-plugin-react-hooks
          fi
        continue-on-error: true

      # Run ESLint if config exists
      - run: npm run lint
        if: ${{ hashFiles('frontend/eslint.config.js', 'frontend/.eslintrc*') != '' }}
        continue-on-error: true

      # Build (this also catches TypeScript/type errors if using tsc)
      - run: npm run build

      # Verify build output exists
      - run: |
          if [ ! -d "dist" ]; then
            echo "Build output missing!"
            exit 1
          fi
          echo "Build successful - $(du -sh dist | cut -f1)"

  # Backend: Import check + Lint + Security scan
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # Basic import check
      - run: python -c "from app.main import app; print('Import OK')"

      # Security scan with bandit
      - run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ || true
        continue-on-error: true

      # Lint with ruff (faster than pylint)
      - run: |
          pip install ruff
          ruff check app/ || true
        continue-on-error: true

      # Upload security report as artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-report
          path: backend/bandit-report.json
          if-no-files-found: ignore
